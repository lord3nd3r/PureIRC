<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SITE_NAME}} — Web Chat</title>
  <link rel="icon" type="image/svg+xml" href="vite.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/lucide.min.js"></script>
  <style>
    :root {
      --theme-primary: #06b6d4;
      --theme-accent: #22d3ee;
      --theme-accent-light: cyan-400;
      --theme-accent-dark: cyan-600;
    }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #030712; }
    #irc-tab-bar { scrollbar-width: none; -ms-overflow-style: none; }
    #irc-tab-bar::-webkit-scrollbar { display: none; }
    .irc-tab { display: flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 12px; font-family: ui-monospace, monospace; color: #9ca3af; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.1s; flex-shrink: 0; }
    .irc-tab:hover { background: rgba(255,255,255,0.05); color: #e5e7eb; }
    .irc-tab.active { background: rgba(6,182,212,0.1); color: #22d3ee; border-bottom: 2px solid #22d3ee; }
    .irc-tab .tab-close { opacity: 0; margin-left: 4px; padding: 1px; border-radius: 3px; transition: opacity 0.1s; }
    .irc-tab:hover .tab-close { opacity: 0.6; }
    .irc-tab .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }
    .irc-tab .tab-unread { width: 6px; height: 6px; border-radius: 50%; background: #22d3ee; flex-shrink: 0; }
    .channel-pill.active { background: rgba(6,182,212,0.15); border-color: rgba(6,182,212,0.4); color: #22d3ee; }
    .channel-pill { transition: all 0.15s; }
    .channel-pill:hover { background: rgba(255,255,255,0.08); }
    #irc-messages .msg-line { padding: 1px 0; word-wrap: break-word; overflow-wrap: break-word; }
    #irc-messages .msg-nick { cursor: default; }
    #irc-messages .msg-self .msg-nick { color: #22d3ee; }
    #irc-messages .msg-action { color: #a78bfa; font-style: italic; }
    #irc-messages .msg-join { color: #34d399; }
    #irc-messages .msg-part, #irc-messages .msg-quit { color: #f87171; }
    #irc-messages .msg-notice { color: #fbbf24; }
    #irc-messages .msg-system { color: #6b7280; }
    #irc-messages .msg-topic { color: #60a5fa; }
    #irc-userlist .user-item { padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: ui-monospace, monospace; color: #9ca3af; cursor: default; }
    #irc-userlist .user-item:hover { background: rgba(255,255,255,0.05); }
    #irc-userlist .user-item .user-prefix { color: #22d3ee; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-950 text-white flex flex-col h-screen">
  <!-- Header -->
  <div class="flex items-center justify-between px-6 py-3 border-b border-white/5 bg-gray-900/50 flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-cyan-500 flex items-center justify-center">
        <i data-lucide="radio" class="w-4 h-4 text-gray-950"></i>
      </div>
      <div>
        <span class="text-white font-bold text-sm">{{SITE_NAME}} Web Client</span>
        <span id="irc-channel-display" class="ml-2 text-cyan-400 text-xs font-mono"></span>
      </div>
      <div id="irc-status-indicator" class="flex items-center gap-1.5 ml-4 hidden">
        <span id="irc-status-dot" class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span id="irc-status-text" class="text-xs text-gray-500">Connected</span>
      </div>
    </div>
    <a href="/" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">← Back to {{SITE_NAME}}</a>
  </div>

  <!-- Connect Form -->
  <div id="irc-connect-form" class="flex-1 flex items-center justify-center p-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center mx-auto mb-4">
          <i data-lucide="radio" class="w-8 h-8 text-cyan-400"></i>
        </div>
        <h3 class="text-2xl font-bold text-white mb-2">Connect to {{SITE_NAME}}</h3>
        <p class="text-sm text-gray-400">Enter your details below to join the network</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Nickname</label>
          <input id="irc-nickname" type="text" placeholder="Enter a nickname..." maxlength="16"
            class="w-full px-4 py-3 bg-gray-900 border border-white/10 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/25 transition-colors" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Channel</label>
          <input id="irc-channel-input" type="text" placeholder="{{DEFAULT_CHANNEL}}" value="{{DEFAULT_CHANNEL}}"
            class="w-full px-4 py-3 bg-gray-900 border border-white/10 rounded-xl text-white text-sm placeholder-gray-600 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/25 transition-colors font-mono" />
          <div class="flex flex-wrap gap-2 mt-3" id="channel-quick-picks"></div>
        </div>
        <div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input id="irc-ssl" type="checkbox" class="w-4 h-4 rounded bg-gray-900 border-gray-700 text-cyan-500 focus:ring-cyan-500/25" />
            <span class="text-sm text-gray-400">Use SSL/TLS</span>
            <i data-lucide="lock" class="w-3 h-3 text-emerald-400"></i>
          </label>
        </div>
        <button onclick="connectIrc()" class="w-full py-3.5 bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold rounded-xl transition-all duration-200 hover:-translate-y-0.5 shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2 text-sm">
          <i data-lucide="radio" class="w-4 h-4"></i>
          Connect to {{SITE_NAME}}
        </button>
        <p id="irc-connect-error" class="hidden text-red-400 text-xs text-center mt-3"></p>
      </div>
      <div class="mt-6 bg-gray-900 rounded-xl border border-white/5 p-4">
        <p class="text-xs text-gray-500 mb-2 font-semibold uppercase tracking-widest">Server Info</p>
        <div class="flex items-center justify-between text-xs">
          <span class="text-gray-500">Host</span>
          <code class="text-cyan-300 font-mono">{{IRC_HOST}}</code>
        </div>
        <div class="flex items-center justify-between text-xs mt-1">
          <span class="text-gray-500">Port</span>
          <code class="text-cyan-300 font-mono">{{IRC_PORT}}</code>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Area (shown after connecting) -->
  <div id="irc-chat-container" class="flex-1 hidden flex flex-col overflow-hidden">
    <!-- Channel Tab Bar -->
    <div class="flex-shrink-0 border-b border-white/5 bg-gray-900/30 flex items-center">
      <div id="irc-tab-bar" class="flex overflow-x-auto flex-1"></div>
    </div>
    <!-- Main chat area -->
    <div class="flex-1 flex overflow-hidden">
      <!-- Messages -->
      <div class="flex-1 flex flex-col min-w-0">
        <div id="irc-messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-0.5 font-mono text-sm leading-relaxed scroll-smooth" style="overflow-anchor: auto;"></div>
        <!-- Input -->
        <div class="flex-shrink-0 border-t border-white/5 bg-gray-900/50 px-4 py-3">
          <div class="flex gap-2">
            <input id="irc-input" type="text" placeholder="Type a message..." maxlength="512"
              class="flex-1 px-4 py-2.5 bg-gray-950 border border-white/10 rounded-lg text-white text-sm placeholder-gray-600 focus:outline-none focus:border-cyan-500/50 focus:ring-1 focus:ring-cyan-500/25 transition-colors font-mono" />
            <button onclick="sendIrcMessage()" class="px-4 py-2.5 bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold rounded-lg transition-colors text-sm">
              Send
            </button>
          </div>
        </div>
      </div>
      <!-- User List Sidebar -->
      <div id="irc-userlist-panel" class="w-48 flex-shrink-0 border-l border-white/5 bg-gray-900/30 flex flex-col">
        <div class="px-3 py-2 border-b border-white/5 flex items-center justify-between">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-widest">Users</span>
          <span id="irc-user-count" class="text-xs text-gray-600 font-mono">0</span>
        </div>
        <div id="irc-userlist" class="flex-1 overflow-y-auto px-2 py-2 space-y-0.5"></div>
      </div>
    </div>
  </div>

  <!-- Injected Site Config -->
  <script>
    window.SITE_CONFIG = {
      siteName: '{{SITE_NAME}}',
      domain: '{{SITE_DOMAIN}}',
      defaultChannel: '{{DEFAULT_CHANNEL}}',
      supportChannel: '{{SUPPORT_CHANNEL}}',
      foundedYear: '{{FOUNDED_YEAR}}',
      userPrefix: '{{USER_PREFIX}}',
      ircHost: '{{IRC_HOST}}',
      ircPort: '{{IRC_PORT}}',
      ircPortSSL: '{{IRC_PORT_SSL}}'
    };
    // Standalone mode flag — checked by main.js
    window.__ircStandalone = true;
  </script>
  <!-- Configuration Manager -->
  <script src="/js/config-manager.js"></script>
  <!-- Theme Manager -->
  <script src="/js/theme-manager.js"></script>
  <!-- Main Application Script -->
  <script src="/js/main.js"></script>
  <script>
    // Enter key on input sends message
    document.getElementById('irc-input')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendIrcMessage();
    });
    // Enter key on nickname/channel fields triggers connect
    document.getElementById('irc-nickname')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connectIrc();
    });
    document.getElementById('irc-channel-input')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') connectIrc();
    });
    // Initialize lucide icons
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
